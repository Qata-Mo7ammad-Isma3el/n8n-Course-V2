<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./API-logo.png">
    <title>API Visualizer</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --bg-input: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
            --border: #475569;
            --footer-height: 50px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        header {
            height: 60px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            justify-content: space-between;
            flex-shrink: 0;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--success);
        }

        /* MAIN LAYOUT */
        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .scenario-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 1rem;
            text-align: left;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .scenario-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .scenario-btn.active {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent);
            border-left: 4px solid var(--accent);
        }

        .tag {
            display: inline-block;
            width: 50px;
            text-align: center;
            background: #334155;
            color: white;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-right: 8px;
            font-weight: bold;
        }

        .tag.GET {
            background: #0ea5e9;
        }

        .tag.POST {
            background: #8b5cf6;
        }

        /* MAIN CONTENT */
        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
        }

        /* ANIMATION AREA */
        .animation-area {
            flex: 1;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            overflow: hidden;
        }

        /* NODES */
        .node {
            width: 120px;
            text-align: center;
            z-index: 2;
            flex-shrink: 0;
        }

        .node-icon {
            font-size: 3rem;
            background: var(--bg-panel);
            border: 2px solid var(--border);
            border-radius: 16px;
            width: 100px;
            height: 100px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
        }

        .node-label {
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .node.processing .node-icon {
            border-color: var(--warning);
            color: var(--warning);
            animation: pulse 1.5s infinite;
        }

        .node.success .node-icon {
            border-color: var(--success);
            color: var(--success);
        }

        .node.error .node-icon {
            border-color: var(--error);
            color: var(--error);
        }

        /* THE PACKET */
        .packet {
            position: absolute;
            top: 50%;
            left: 5%;
            transform: translateY(-50%);
            width: 300px;
            background: #ffffff;
            color: #1e293b;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
            font-size: 0.9rem;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            border-left: 5px solid var(--accent);
            transition: box-shadow 0.2s, transform 0.2s;
        }

        .packet.anim-right,
        .packet.anim-left {
            pointer-events: auto;
            cursor: pointer;
        }

        .packet.anim-right:hover,
        .packet.anim-left:hover {
            animation-play-state: paused !important;
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.9);
        }

        .packet.anim-right:hover::after,
        .packet.anim-left:hover::after {
            content: '🔍 Click to inspect';
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-panel);
            color: var(--text-main);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            white-space: nowrap;
            border: 1px solid var(--border);
        }

        /* MODAL */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .modal-backdrop.open {
            display: flex;
        }

        .modal-card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            max-width: 720px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        .modal-card h2 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .modal-close {
            background: var(--bg-input);
            border: none;
            color: var(--text-main);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .modal-close:hover {
            background: var(--error);
        }

        .modal-section {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }

        .modal-section h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .modal-section pre {
            font-family: 'Consolas', monospace;
            font-size: 0.8rem;
            color: var(--text-main);
            white-space: pre-wrap;
            word-break: break-all;
        }

        .kv-row {
            display: flex;
            gap: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            padding: 2px 0;
        }

        .kv-key {
            color: #60a5fa;
            min-width: 120px;
        }

        .kv-val {
            color: #e2e8f0;
            word-break: break-all;
        }

        .packet.response {
            border-left-color: var(--success);
        }

        .packet.response.error {
            border-left-color: var(--error);
        }

        .packet.fallback {
            border-left-color: var(--warning);
        }

        .pkt-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 8px;
            margin-bottom: 8px;
            font-weight: bold;
            font-family: monospace;
        }

        .pkt-section {
            background: #f1f5f9;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }

        .pkt-label {
            color: #64748b;
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .pkt-val {
            font-family: monospace;
            word-break: break-all;
            color: #0f172a;
        }

        /* ANIMATIONS */
        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 20px rgba(245, 158, 11, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0);
            }
        }

        @keyframes moveRight {
            0% {
                left: 5%;
                opacity: 1;
            }

            100% {
                left: 85%;
                opacity: 1;
            }
        }

        @keyframes moveLeft {
            0% {
                left: 85%;
                opacity: 1;
            }

            100% {
                left: 5%;
                opacity: 1;
            }
        }

        .anim-right {
            animation: moveRight 5s linear forwards;
        }

        .anim-left {
            animation: moveLeft 5s linear forwards;
        }

        /* BOTTOM CONTROLS */
        .controls-panel {
            height: 40%;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: 300px 1fr 1fr;
            overflow: hidden;
            flex-shrink: 0;
        }

        .panel-col {
            border-right: 1px solid var(--border);
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .panel-col:last-child {
            border-right: none;
        }

        .col-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* FORM ELEMENTS */
        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: #cbd5e1;
        }

        .input-group input {
            width: 100%;
            padding: 8px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            border-radius: 4px;
            font-family: monospace;
        }

        .input-group input:focus {
            outline: 1px solid var(--accent);
            border-color: var(--accent);
        }

        .btn-run {
            width: 100%;
            padding: 12px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: auto;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .btn-run:hover {
            background: #16a34a;
        }

        .btn-run:disabled {
            background: #334155;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.8rem;
            font-size: 0.85rem;
            cursor: pointer;
            color: #cbd5e1;
        }

        .checkbox-group input {
            width: auto;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .checkbox-group.fallback-box {
            background: rgba(245, 158, 11, 0.1);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--warning);
            color: var(--warning);
        }

        .checkbox-group.fallback-box input {
            accent-color: var(--warning);
        }

        /* CODE BLOCK */
        .code-block {
            background: #0f172a;
            padding: 10px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #a5b4fc;
            white-space: pre-wrap;
            border: 1px solid var(--border);
            height: 100%;
        }

        /* LOGS */
        .log-entry {
            font-family: monospace;
            font-size: 0.8rem;
            margin-bottom: 6px;
            border-left: 3px solid transparent;
            padding-left: 8px;
            line-height: 1.4;
        }

        .log-info {
            border-color: var(--accent);
            color: #e2e8f0;
        }

        .log-success {
            border-color: var(--success);
            color: var(--success);
            background: rgba(34, 197, 94, 0.1);
        }

        .log-error {
            border-color: var(--error);
            color: var(--error);
            background: rgba(239, 68, 68, 0.1);
        }

        .log-warn {
            border-color: var(--warning);
            color: var(--warning);
        }

        /* FOOTER */
        footer {
            height: var(--footer-height);
            background: #0b1120;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        footer a {
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--accent);
        }

        .footer-brand {
            font-weight: bold;
            color: var(--text-main);
            margin-right: 1rem;
        }

        @media (max-width: 900px) {
            .controls-panel {
                grid-template-columns: 1fr;
                overflow-y: auto;
                height: auto;
            }

            .panel-col {
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .sidebar {
                width: 200px;
            }

            .packet {
                width: 200px;
                font-size: 0.8rem;
            }

            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 150px;
                flex-direction: row;
                overflow-x: auto;
            }

            .scenario-btn {
                min-width: 200px;
                border-bottom: none;
                border-right: 1px solid var(--border);
            }
        }
    </style>
</head>

<body>

    <div class="app-container">

        <div class="main-stage">

                    </div>
                    <div id="pkt-container-auth" class="pkt-section" style="display:none;">

                        <div id="pkt-val-auth" class="pkt-val"></div>
                    </div>
                </div>

                <div class="node" id="server-node">
                    <div class="node-icon">🖥️</div>

                </div>
            </div>

            <div class="controls-panel">
                <div class="panel-col">
                    <div class="col-title">Configuration</div>

                        <span>Auto-Fallback on CORS/Network Error</span>

                <div class="panel-col">

    <div id="modal-backdrop" class="modal-backdrop">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2><span id="modal-title">Packet Inspector</span><button class="modal-close"
                    onclick="closeModal()">✕</button></h2>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://sunday-chirurgic-earlene.ngrok-free.dev";
        let lastRequestSnapshot = null;
        let lastResponseSnapshot = null;
        let currentPacketPhase = null; // 'request' | 'response'

        function openModal() {
            const phase = currentPacketPhase;
            const snap = phase === 'response' ? lastResponseSnapshot : lastRequestSnapshot;
            if (!snap) return;
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            title.textContent = phase === 'response' ? '📥 Response Details' : '📤 Request Details';

            let html = '';
            if (phase === 'request') {
                html += `<div class="modal-section"><h3>Method & URL</h3><pre>${snap.method} ${snap.url}</pre></div>`;
                const hKeys = Object.keys(snap.headers || {});
                if (hKeys.length) {
                    html += `<div class="modal-section"><h3>Headers</h3>`;
                    hKeys.forEach(k => { html += `<div class="kv-row"><span class="kv-key">${k}:</span><span class="kv-val">${escapeHtml(snap.headers[k])}</span></div>`; });
                    html += `</div>`;
                }
                if (snap.query && Object.keys(snap.query).length) {
                    html += `<div class="modal-section"><h3>Query Parameters</h3>`;
                    Object.keys(snap.query).forEach(k => { html += `<div class="kv-row"><span class="kv-key">${k}:</span><span class="kv-val">${escapeHtml(snap.query[k])}</span></div>`; });
                    html += `</div>`;
                }
                if (snap.body) {
                    html += `<div class="modal-section"><h3>Body (JSON)</h3><pre>${escapeHtml(JSON.stringify(snap.body, null, 2))}</pre></div>`;
                }
                html += `<div class="modal-section"><h3>cURL Equivalent</h3><pre>${escapeHtml(snap.curl)}</pre></div>`;
            } else {
                html += `<div class="modal-section"><h3>Status</h3><pre>${snap.status} ${snap.statusText}${snap.isFallback ? ' (LOCAL FALLBACK)' : ''}</pre></div>`;
                html += `<div class="modal-section"><h3>Response Body</h3><pre>${escapeHtml(typeof snap.data === 'string' ? snap.data : JSON.stringify(snap.data, null, 2))}</pre></div>`;
                if (snap.durationMs != null) html += `<div class="modal-section"><h3>Duration</h3><pre>${snap.durationMs} ms</pre></div>`;
                if (snap.errorHint) html += `<div class="modal-section" style="border-color:var(--error)"><h3>Diagnostic</h3><pre>${escapeHtml(snap.errorHint)}</pre></div>`;
            }
            content.innerHTML = html;
            document.getElementById('modal-backdrop').classList.add('open');
            pipelinePaused = true;
            const pkt = document.getElementById('packet');
            if (pkt) pkt.style.animationPlayState = 'paused';
        }
        function closeModal() {
            document.getElementById('modal-backdrop').classList.remove('open');
            pipelinePaused = false;
            const pkt = document.getElementById('packet');
            if (pkt) pkt.style.animationPlayState = '';
        }
        function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

        const scenarios = [
            {
                id: 'root',
                title: 'Root Endpoint',
                method: 'GET',
                url: '/',
                desc: 'Simple health check.',
                inputs: []
            },
            {
                id: 'query',
                title: 'Query Parameters',
                method: 'GET',
                url: '/sum/query',
                desc: 'Pass data in URL.',
                inputs: [
                    { key: 'num1', label: 'Number 1', type: 'number', default: 15, location: 'query' },
                    { key: 'num2', label: 'Number 2', type: 'number', default: 25, location: 'query' }
                ]
            },
            {
                id: 'body',
                title: 'Request Body (JSON)',
                method: 'POST',
                url: '/sum/body',
                desc: 'Pass data in payload.',
                inputs: [
                    { key: 'num1', label: 'Number 1', type: 'number', default: 30, location: 'body' },
                    { key: 'num2', label: 'Number 2', type: 'number', default: 12, location: 'body' }
                ]
            },
            {
                id: 'header-params',
                title: 'Header Parameters',
                method: 'GET',
                url: '/sum/header',
                desc: 'Pass data in headers.',
                inputs: [
                    { key: 'num1', label: 'Num 1 (Header)', type: 'number', default: 7.5, location: 'header', headerName: 'X-Num1' },
                    { key: 'num2', label: 'Num 2 (Header)', type: 'number', default: 2.5, location: 'header', headerName: 'X-Num2' }
                ]
            },
            {
                id: 'api-key',
                title: 'API Key Auth',
                method: 'GET',
                url: '/auth/api-key-header',
                desc: 'Secret key in header.',
                inputs: [
                    { key: 'num1', label: 'Num 1', type: 'number', default: 100, location: 'query' },
                    { key: 'num2', label: 'Num 2', type: 'number', default: 50, location: 'query' },
                    { key: 'api_key', label: 'API Key', type: 'text', default: 'my-secret-api-key-123', location: 'header', headerName: 'X-API-Key' }
                ],
                hasSimulateError: true
            },
            {
                id: 'api-key-query',
                title: 'API Key in Query',
                method: 'GET',
                url: '/auth/api-key-query',
                desc: 'Secret key in URL.',
                inputs: [
                    { key: 'num1', label: 'Num 1', type: 'number', default: 80, location: 'query' },
                    { key: 'num2', label: 'Num 2', type: 'number', default: 20, location: 'query' },
                    { key: 'api_key', label: 'API Key', type: 'text', default: 'my-secret-api-key-123', location: 'query' }
                ],
                hasSimulateError: true
            },
            {
                id: 'bearer',
                title: 'Bearer Token (OAuth 2)',
                method: 'POST',
                url: '/auth/bearer',
                desc: 'Standard Authorization header.',
                inputs: [
                    { key: 'num1', label: 'Num 1', type: 'number', default: 45, location: 'body' },
                    { key: 'num2', label: 'Num 2', type: 'number', default: 55, location: 'body' },
                    { key: 'token', label: 'Bearer Token', type: 'text', default: 'valid-bearer-token-xyz', location: 'header', headerName: 'Authorization', prefix: 'Bearer ' }
                ],
                hasSimulateError: true
            },
            {
                id: 'basic',
                title: 'Basic Auth',
                method: 'POST',
                url: '/auth/basic',
                desc: 'Base64 encoded credentials.',
                inputs: [
                    { key: 'num1', label: 'Num 1', type: 'number', default: 33, location: 'body' },
                    { key: 'num2', label: 'Num 2', type: 'number', default: 67, location: 'body' },
                    { key: 'user', label: 'Username', type: 'text', default: 'admin', location: 'auth_user' },
                    { key: 'pass', label: 'Password', type: 'password', default: 'secret123', location: 'auth_pass' }
                ],
                hasSimulateError: true
            },
            {
                id: 'combined',
                title: 'Combined Example',
                method: 'POST',
                url: '/combined/all-methods',
                desc: 'Using Query, Header, and Body.',
                inputs: [
                    { key: 'multiplier', label: 'Multiplier (Query)', type: 'number', default: 2.5, location: 'query' },
                    { key: 'api_key', label: 'API Key (Header)', type: 'text', default: 'my-secret-api-key-123', location: 'header', headerName: 'X-API-Key' },
                    { key: 'num1', label: 'Num 1 (Body)', type: 'number', default: 10, location: 'body' },
                    { key: 'num2', label: 'Num 2 (Body)', type: 'number', default: 20, location: 'body' }
                ]
            }
        ];

        let currentScenario = null;
        let isAnimating = false;

        const dom = {
            list: document.getElementById('scenario-list'),
            form: document.getElementById('input-form'),
            curl: document.getElementById('curl-preview'),
            logs: document.getElementById('log-view'),
            packet: document.getElementById('packet'),
            btnRun: document.getElementById('btn-run'),
            server: document.getElementById('server-node'),
            pktMethod: document.getElementById('pkt-method'),
            pktStatus: document.getElementById('pkt-status'),
            pktQuery: document.getElementById('pkt-container-query'),
            pktBody: document.getElementById('pkt-container-body'),
            pktAuth: document.getElementById('pkt-container-auth'),
            valQuery: document.getElementById('pkt-val-query'),
            valBody: document.getElementById('pkt-val-body'),
            valAuth: document.getElementById('pkt-val-auth'),
            useFallback: document.getElementById('use-fallback')
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderSidebar();
            loadScenario(0);
            dom.btnRun.addEventListener('click', runSimulation);
            dom.packet.addEventListener('click', () => {
                if (dom.packet.classList.contains('anim-right') || dom.packet.classList.contains('anim-left')) {
                    openModal();
                }
            });
            document.getElementById('modal-backdrop').addEventListener('click', closeModal);
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
        });

        function renderSidebar() {
            dom.list.innerHTML = '';
            scenarios.forEach((s, index) => {
                const btn = document.createElement('button');
                btn.className = 'scenario-btn';
                btn.innerHTML = `<span class="tag ${s.method}">${s.method}</span> ${s.title}`;
                btn.onclick = () => loadScenario(index);
                dom.list.appendChild(btn);
            });
        }

        function loadScenario(index) {
            if (isAnimating) return;
            currentScenario = scenarios[index];

            document.querySelectorAll('.scenario-btn').forEach((b, i) => {
                b.classList.toggle('active', i === index);
            });

            renderInputs(currentScenario);
            updatePreview();

            dom.logs.innerHTML = '';
            log(`Ready: ${currentScenario.title}`, 'info');
        }

        function renderInputs(scenario) {
            dom.form.innerHTML = '';

            if (scenario.hasSimulateError) {
                const div = document.createElement('div');
                div.className = 'checkbox-group';
                div.innerHTML = `
                <input type="checkbox" id="sim-error">
                <label for="sim-error">Simulate Invalid Auth/Error</label>
            `;
                div.querySelector('input').addEventListener('change', updatePreview);
                dom.form.appendChild(div);
            }

            scenario.inputs.forEach(inp => {
                const group = document.createElement('div');
                group.className = 'input-group';
                let inputType = inp.type || 'text';
                if (inp.key === 'pass' || inp.key === 'password') inputType = 'password';

                group.innerHTML = `
                <label>${inp.label}</label>
                <input type="${inputType}" id="inp-${inp.key}" value="${inp.default}">
            `;
                group.querySelector('input').addEventListener('input', updatePreview);
                dom.form.appendChild(group);
            });
        }

        function updatePreview() {
            if (!currentScenario) return;
            const isError = document.getElementById('sim-error')?.checked;
            let cmd = `curl -X ${currentScenario.method} "${BASE_URL}${currentScenario.url}`;

            let queryParams = [];
            let headers = [];
            let bodyData = {};
            let authDisplay = '';

            currentScenario.inputs.forEach(inp => {
                const val = document.getElementById(`inp-${inp.key}`).value;
                let effectiveVal = val;
                if (isError && (inp.key === 'api_key' || inp.key === 'token')) effectiveVal = 'invalid-credentials-xyz';

                if (inp.location === 'query') {
                    queryParams.push(`${inp.key}=${effectiveVal}`);
                } else if (inp.location === 'header') {
                    let hVal = effectiveVal;
                    if (inp.prefix) hVal = inp.prefix + hVal;
                    headers.push(`-H "${inp.headerName || inp.key}: ${hVal}"`);
                    authDisplay = `${inp.headerName || inp.key}: ${hVal}`;
                } else if (inp.location === 'body') {
                    bodyData[inp.key] = isNaN(val) ? val : Number(val);
                }
            });

            const basicUser = document.getElementById('inp-user')?.value;
            const basicPass = document.getElementById('inp-pass')?.value;
            if (basicUser) {
                const creds = isError ? "wrong:password" : `${basicUser}:${basicPass}`;
                headers.push(`-u "${creds}"`);
                authDisplay = `Basic (Encoded): ${btoa(creds)}`;
            }

            if (queryParams.length > 0) cmd += '?' + queryParams.join('&');
            cmd += '"';
            if (headers.length > 0) cmd += ' \\\n  ' + headers.join(' \\\n  ');
            if (Object.keys(bodyData).length > 0) cmd += ` \\\n  -d '${JSON.stringify(bodyData)}'`;

            dom.curl.textContent = cmd;
        }

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString().split(' ')[0];
            div.innerHTML = `<span style="opacity:0.5; font-size:0.7em;">[${time}]</span> ${msg}`;
            dom.logs.appendChild(div);
            dom.logs.scrollTop = dom.logs.scrollHeight;
        }

        let pipelinePaused = false;
        function wait(ms) {
            return new Promise(resolve => {
                const start = Date.now();
                let elapsed = 0;
                const tick = () => {
                    if (!pipelinePaused) elapsed += 50;
                    if (elapsed >= ms) resolve();
                    else setTimeout(tick, 50);
                };
                tick();
            });
        }

        // --- REAL API CALL (CORS SAFE + snapshot capture) ---
        async function executeRealApiCall(scenario) {
            const isError = document.getElementById('sim-error')?.checked;
            const urlObj = new URL(BASE_URL + scenario.url);

            const headers = {};
            const queryMap = {};
            let body = null;
            let hasCustomHeaders = false;

            scenario.inputs.forEach(inp => {
                const val = document.getElementById(`inp-${inp.key}`).value;
                let effectiveVal = val;
                if (isError && (inp.key === 'api_key' || inp.key === 'token')) effectiveVal = 'invalid-credentials-xyz';
                if (isError && (inp.key === 'user' || inp.key === 'pass')) effectiveVal = (inp.key === 'user' ? 'wrong' : 'password');

                if (inp.location === 'query') {
                    urlObj.searchParams.append(inp.key, effectiveVal);
                    queryMap[inp.key] = effectiveVal;
                } else if (inp.location === 'header') {
                    let hVal = effectiveVal;
                    if (inp.prefix) hVal = inp.prefix + hVal;
                    headers[inp.headerName || inp.key] = hVal;
                    hasCustomHeaders = true;
                } else if (inp.location === 'body') {
                    if (!body) body = {};
                    body[inp.key] = isNaN(val) ? val : Number(val);
                }
            });

            const basicUser = document.getElementById('inp-user')?.value;
            const basicPass = document.getElementById('inp-pass')?.value;
            if (basicUser) {
                const creds = isError ? "wrong:password" : `${basicUser}:${basicPass}`;
                headers['Authorization'] = `Basic ${btoa(creds)}`;
                hasCustomHeaders = true;
            }

            // Always send application/json for bodies — FastAPI/Pydantic needs this to
            // parse the body into a model. (Previously tried text/plain to skip preflight,
            // but that makes Pydantic receive a raw string and throw 422.)
            if (body) {
                headers['Content-Type'] = 'application/json';
                hasCustomHeaders = true;
            }

            // ngrok free tier injects an interstitial warning page unless this header is present.
            // Adding it forces preflight, but without it ngrok returns HTML and fetch fails.
            headers['ngrok-skip-browser-warning'] = 'true';
            hasCustomHeaders = true;

            const options = { method: scenario.method, headers: headers };
            if (body) options.body = JSON.stringify(body);

            // Build cURL for snapshot
            let curl = `curl -X ${scenario.method} "${urlObj.toString()}"`;
            Object.keys(headers).forEach(k => curl += ` \\\n  -H "${k}: ${headers[k]}"`);
            if (body) curl += ` \\\n  -d '${JSON.stringify(body)}'`;

            lastRequestSnapshot = {
                method: scenario.method,
                url: urlObj.toString(),
                headers: { ...headers },
                query: queryMap,
                body: body,
                curl: curl,
                hasCustomHeaders: hasCustomHeaders
            };

            const t0 = performance.now();
            try {
                log(`Attempting real connection to ${urlObj.hostname}...`, 'info');
                if (hasCustomHeaders) log(`Custom headers present → browser will send OPTIONS preflight first.`, 'warn');
                const response = await fetch(urlObj.toString(), options);
                let data;
                const ct = response.headers.get('content-type') || '';
                try { data = ct.includes('json') ? await response.json() : await response.text(); }
                catch (e) { data = await response.text().catch(() => ''); }
                const result = { ok: response.ok, status: response.status, statusText: response.statusText, data, isFallback: false, durationMs: Math.round(performance.now() - t0) };
                if (response.status === 405) {
                    result.errorHint = "405 Method Not Allowed on OPTIONS preflight.\n\nThe server does not handle CORS preflight. Fix on the SERVER (FastAPI):\n\nfrom fastapi.middleware.cors import CORSMiddleware\napp.add_middleware(\n    CORSMiddleware,\n    allow_origins=['*'],\n    allow_credentials=False,\n    allow_methods=['*'],\n    allow_headers=['*'],\n)\n\nPostman/direct browser works because they skip preflight — only cross-origin JS fetch triggers it.";
                }
                lastResponseSnapshot = { ...result };
                return result;
            } catch (error) {
                console.error(error);
                const result = {
                    ok: false, status: 0, statusText: "Network/CORS Error",
                    data: { error: error.message }, isFallback: false, rawError: error,
                    durationMs: Math.round(performance.now() - t0),
                    errorHint: "fetch() threw — usually CORS preflight was blocked or the server is unreachable. Check the server's CORS config and that OPTIONS is allowed."
                };
                lastResponseSnapshot = { ...result };
                return result;
            }
        }

        // --- LOCAL FALLBACK SIMULATION ---
        function executeFallbackSimulation(scenario) {
            const isError = document.getElementById('sim-error')?.checked;

            if (isError) {
                return {
                    ok: false,
                    status: 401,
                    statusText: "Unauthorized (Simulated)",
                    data: { error: "Invalid credentials (Simulated Fallback)" },
                    isFallback: true
                };
            }

            const num1 = parseFloat(document.getElementById('inp-num1')?.value || 0);
            const num2 = parseFloat(document.getElementById('inp-num2')?.value || 0);

            let resultData = { message: "Fallback Simulation Successful", note: "Real server connection failed/blocked (CORS/405), showing local calculation." };

            if (scenario.id.includes('sum') || scenario.id === 'combined') {
                resultData.result = num1 + num2;
                resultData.calculation = `${num1} + ${num2} = ${num1 + num2}`;
            }

            return { ok: true, status: 200, statusText: "OK (Simulated)", data: resultData, isFallback: true };
        }

        // --- MAIN RUNNER ---
        async function runSimulation() {
            if (isAnimating) return;
            isAnimating = true;
            dom.btnRun.disabled = true;
            dom.btnRun.textContent = 'Connecting...';
            dom.logs.innerHTML = '';

            // 1. Visual Packet Setup
            const isError = document.getElementById('sim-error')?.checked;
            let pktQuery = '', pktBody = '', pktAuth = '';

            currentScenario.inputs.forEach(inp => {
                const val = document.getElementById(`inp-${inp.key}`).value;
                let effectiveVal = val;
                if (isError && (inp.key === 'api_key' || inp.key === 'token')) effectiveVal = 'invalid-credentials-xyz';
                if (isError && (inp.key === 'user' || inp.key === 'pass')) effectiveVal = (inp.key === 'user' ? 'wrong' : 'password');
                if (inp.location === 'query') pktQuery += `${inp.key}=${effectiveVal} `;
                if (inp.location === 'header') pktAuth += `${inp.headerName || inp.key}: ${effectiveVal} `;
                if (inp.location === 'body') pktBody += `${inp.key}: ${effectiveVal} `;
            });

            const basicUser = document.getElementById('inp-user')?.value;
            const basicPass = document.getElementById('inp-pass')?.value;
            if (basicUser) { const creds = isError ? "wrong:password" : `${basicUser}:${basicPass}`; pktAuth = `Authorization: Basic ${btoa(creds)}`; }

            dom.pktMethod.textContent = currentScenario.method;
            dom.pktMethod.style.color = currentScenario.method === 'GET' ? 'var(--accent)' : '#a855f7';
            dom.pktStatus.textContent = 'Sending...';
            dom.packet.classList.remove('response', 'error', 'fallback');
            dom.pktQuery.style.display = pktQuery ? 'block' : 'none'; dom.valQuery.textContent = pktQuery;
            dom.pktBody.style.display = pktBody ? 'block' : 'none'; dom.valBody.textContent = pktBody;
            dom.pktAuth.style.display = pktAuth ? 'block' : 'none'; dom.valAuth.textContent = pktAuth;

            // 2. Animate Out
            currentPacketPhase = 'request';
            const requestPromise = executeRealApiCall(currentScenario);
            dom.packet.style.opacity = 1;
            dom.packet.classList.add('anim-right');

            await wait(2500);
            log('Packet traveling to server...', 'info');

            await wait(2500);
            dom.packet.classList.remove('anim-right');
            dom.packet.style.left = '85%';
            dom.packet.style.opacity = 0;

            // 3. Processing
            dom.server.classList.add('processing');
            log('Request arrived. Processing...', 'warn');

            let result = await requestPromise;

            // HANDLE FALLBACK LOGIC (Improved for 405)
            if (!result.ok && dom.useFallback.checked) {
                if (result.status === 0 || result.statusText.includes('Failed to fetch')) {
                    log(`Network/CORS Error detected.`, 'error');
                } else if (result.status === 405) {
                    log(`Server rejected Method (405). Likely blocked Pre-flight (OPTIONS).`, 'error');
                } else {
                    log(`Server Error ${result.status}.`, 'error');
                }

                log(`Switching to Local Simulation...`, 'warn');
                await wait(1000);
                result = executeFallbackSimulation(currentScenario);
            } else if (!result.ok) {
                log(`Request Failed (${result.status}). Fallback disabled.`, 'error');
            }

            await wait(1000);
            dom.server.classList.remove('processing');

            // 4. Server State
            if (result.ok) {
                dom.server.classList.add('success');
                log(result.isFallback ? `Fallback Success! Calculated locally.` : `Success! Server returned ${result.status}`, 'success');
            } else {
                dom.server.classList.add('error');
                log(`Failed! ${result.status} ${result.statusText}`, 'error');
            }

            // 5. Response Packet
            dom.pktMethod.textContent = result.status;
            dom.pktMethod.style.color = result.ok ? 'var(--success)' : 'var(--error)';
            dom.pktStatus.textContent = result.isFallback ? 'FALLBACK' : (result.ok ? 'Success' : 'Error');

            dom.pktQuery.style.display = 'none';
            dom.pktBody.style.display = 'block';
            let bodyText = JSON.stringify(result.data, null, 2);
            if (bodyText.length > 150) bodyText = bodyText.substring(0, 150) + '...';
            dom.valBody.textContent = bodyText;
            dom.pktAuth.style.display = 'none';

            dom.packet.classList.add('response');
            if (result.isFallback) dom.packet.classList.add('fallback');
            if (!result.ok) dom.packet.classList.add('error');

            // 6. Return Animation
            currentPacketPhase = 'response';
            dom.packet.style.opacity = 1;
            dom.packet.classList.add('anim-left');

            await wait(2500);
            log('Returning response to client...', result.ok ? 'success' : 'error');

            await wait(2500);
            dom.packet.classList.remove('anim-left', 'response', 'error', 'fallback');
            dom.packet.style.left = '5%';
            dom.packet.style.opacity = 0;

            log('Process Complete.', 'info');

            isAnimating = false;
            dom.btnRun.disabled = false;
            dom.btnRun.textContent = 'SEND REQUEST';
            dom.server.classList.remove('success', 'error');
        }

    </script>
</body>
